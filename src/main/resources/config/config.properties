# ---- Appium server ----
# Appium 2.x/3.x default base path is "/" ("/wd/hub" was removed)
appium.server.url=http://127.0.0.1:4723/

# ---- Target platform ----
# Default for a run; override per run with -Dplatform=iOS
platform=Android

# ---- Timeouts ----
explicit.wait=15

# ---- App under test: Android ----
android.appPackage=com.swaglabsmobileapp
android.appActivity=com.swaglabsmobileapp.SplashActivity
android.automationName=UiAutomator2

# ---- App under test: iOS ----
ios.bundleId=com.saucelabs.SwagLabsMobileApp
ios.automationName=XCUITest

# ---- Execution target: local | browserstack ----
# Override per run with -Dexecution.target=browserstack
execution.target=local

# ---- Cloud settings (only read when execution.target != local) ----
# Credentials are NOT stored here. Provide via environment variables (recommended) or -D:
#   BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY   (or -Dcloud.username= / -Dcloud.accessKey=)
cloud.hub.url=https://hub.browserstack.com/wd/hub
cloud.project=Mobile_Automation_Framework
cloud.build=local-build
# Uploaded-app reference on the farm (BrowserStack: bs://<app-id>)
cloud.app=
